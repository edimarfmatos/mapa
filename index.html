<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de Avarias</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #camera { width: 100%; max-width: 500px; height: 350px; border: 2px solid #ccc; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 10px 20px; background-color: #0078d4; color: white; border: none; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn:hover { background-color: #005a9e; }
    </style>
</head>
<body>

    <h2>Coletor de Controle de Avarias</h2>
    
    <div id="camera"></div>
    
    <button class="btn" onclick="iniciarCamera()">Ligar Câmera</button>
    <button class="btn" style="background-color: #107c41;" onclick="enviarParaSharePoint()">Enviar para o SharePoint</button>

    <h3>Itens Conferidos</h3>
    <table id="tabelaConferidos">
        <thead>
            <tr>
                <th>EAN</th>
                <th>Código Interno</th>
                <th>Descrição</th>
                <th>Quantidade</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        // ==========================================
        // CONFIGURAÇÕES DO SHAREPOINT (AJUSTE AQUI)
        // ==========================================
        const SHAREPOINT_CONFIG = {
            // ⚠️ COLE O LINK DO SEU SITE DO SHAREPOINT AQUI (Sem a parte de "Lists/...")
            siteUrl: "https://anheuserbuschinbev.sharepoint.com/sites/Melhoria", 
            
            // ⚠️ O NOME DA SUA LISTA DE DESTINO
            listName: "CadastroItens", 
            
            // Nomes internos das colunas no SharePoint
            colunas: {
                ean: "EAN",
                codigo: "CodigoInterno",
                descricao: "Descricao",
                quantidade: "Quantidade"
            }
        };

        // Banco de dados simulado (Lista "Cadastro Produtos")
        // Como você mencionou, aqui estaria a sua base que o app consulta ao ler o EAN
        const bancoCadastroProdutos = {
            "7891234567890": { codigo: "1001", descricao: "Produto Exemplo A" },
            "7890123456789": { codigo: "1002", descricao: "Produto Exemplo B" }
        };

        // Inicializa o QuaggaJS para leitura contínua
        function iniciarCamera() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#camera'),
                    constraints: {
                        facingMode: "environment" // Usa a câmera traseira do celular
                    },
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader"] // Tipos de código de barras
                }
            }, function(err) {
                if (err) {
                    console.error("Erro ao iniciar câmera:", err);
                    alert("Erro ao abrir a câmera. Certifique-se de que está usando HTTPS.");
                    return;
                }
                Quagga.start();
            });

            // Evento disparado a cada leitura com sucesso
            Quagga.onDetected(function(result) {
                const codigoEAN = result.codeResult.code;
                adicionarItemAALista(codigoEAN);
                
                // Pausa breve para não ler o mesmo código 50 vezes no mesmo segundo
                Quagga.stop();
                setTimeout(() => { Quagga.start(); }, 1500); 
            });
        }

        // Adiciona o produto na tabela temporária da tela
        function adicionarItemAALista(ean) {
            const produto = bancoCadastroProdutos[ean] || { codigo: "N/A", descricao: "Produto não cadastrado" };
            const tabelaBody = document.querySelector('#tabelaConferidos tbody');

            // Cria uma nova linha na tabela
            const novaLinha = document.createElement('tr');
            novaLinha.innerHTML = `
                <td>${ean}</td>
                <td>${produto.codigo}</td>
                <td>${produto.descricao}</td>
                <td>1</td> `;

            tabelaBody.appendChild(novaLinha);
        }

        // Envia todos os itens da tabela para o SharePoint (Múltiplas digitações)
        async function enviarParaSharePoint() {
            const linhas = document.querySelectorAll('#tabelaConferidos tbody tr');
            
            if (linhas.length === 0) {
                alert("Nenhum item na lista para enviar!");
                return;
            }

            // Busca o Context Token necessário para autenticação no SharePoint (Necessário se rodar dentro do ecossistema SP)
            let formDigest = "";
            const digestElement = document.getElementById("__REQUESTDIGEST");
            if (digestElement) {
                formDigest = digestElement.value;
            } else {
                // Se rodar fora, tenta buscar via API do SharePoint
                try {
                    const responseContext = await fetch(`${SHAREPOINT_CONFIG.siteUrl}/_api/contextinfo`, {
                        method: "POST",
                        headers: { "Accept": "application/json;odata=verbose" }
                    });
                    const dataContext = await responseContext.json();
                    formDigest = dataContext.d.GetContextWebInformation.FormDigestValue;
                } catch (e) {
                    console.warn("Não foi possível obter o __REQUESTDIGEST automaticamente. Certifique-se de estar logado no SharePoint.");
                }
            }

            // Loop para enviar item por item (Linha por linha)
            for (const linha of linhas) {
                const ean = linha.cells[0].textContent;
                const codigo = linha.cells[1].textContent;
                const descricao = linha.cells[2].textContent;
                const quantidade = linha.cells[3].textContent; // Sempre será 1

                // Monta o payload do SharePoint
                const itemData = {
                    "__metadata": { "type": `SP.Data.${SHAREPOINT_CONFIG.listName.replace(/\s/g, "")}ListItem` },
                    [SHAREPOINT_CONFIG.colunas.ean]: ean,
                    [SHAREPOINT_CONFIG.colunas.codigo]: codigo,
                    [SHAREPOINT_CONFIG.colunas.descricao]: descricao,
                    [SHAREPOINT_CONFIG.colunas.quantidade]: parseInt(quantidade)
                };

                try {
                    const urlDestino = `${SHAREPOINT_CONFIG.siteUrl}/_api/web/lists/getbytitle('${SHAREPOINT_CONFIG.listName}')/items`;
                    
                    const response = await fetch(urlDestino, {
                        method: "POST",
                        headers: {
                            "Accept": "application/json;odata=verbose",
                            "Content-Type": "application/json;odata=verbose",
                            "X-RequestDigest": formDigest
                        },
                        body: JSON.stringify(itemData)
                    });

                    if (response.ok) {
                        console.log(`Produto ${codigo} enviado com sucesso!`);
                        linha.style.backgroundColor = "#d4edda"; // Pinta a linha de verde se deu certo
                    } else {
                        console.error(`Erro ao enviar o item ${codigo}`);
                        linha.style.backgroundColor = "#f8d7da"; // Pinta de vermelho se falhou
                    }
                } catch (error) {
                    console.error("Erro na requisição REST:", error);
                    linha.style.backgroundColor = "#f8d7da";
                }
            }

            alert("Processo de envio finalizado! Verifique o status (Verde = Sucesso / Vermelho = Erro) na tabela.");
        }
    </script>
</body>
</html>

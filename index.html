<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coletor de Avarias</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body { font-family: Arial; margin: 15px; background:#f4f5f7;}
#camera { width:100%; height:300px; background:#000; border:3px solid #0078d4;}
.btn { padding:12px; margin:5px; font-weight:bold; border:none; cursor:pointer;}
.btn-blue {background:#0078d4;color:#fff;}
.btn-green {background:#107c41;color:#fff;}
table {width:100%; margin-top:10px; background:#fff;}
td,th{padding:10px;border:1px solid #ddd;}
</style>
</head>

<body>

<h2>Coletor de Avarias</h2>

<div id="camera"></div>

<button class="btn btn-blue" onclick="iniciarCamera()">Ligar câmera</button>
<button class="btn btn-green" onclick="enviar()">Enviar</button>
<button class="btn" onclick="limpar()">Limpar</button>

<div id="status"></div>

<table>
<thead>
<tr>
<th>EAN</th>
<th>Código</th>
<th>Descrição</th>
<th>Qtd</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<script>

// CONFIG
const SITE = "https://anheuserbuschinbev.sharepoint.com/sites/Melhoria";
const LIST = "ContAvaria";
const TYPE = "SP.Data.ContAvariaListItem"; // confirme isso!

let lendo = false;
let cameraAtiva = false;

// BANCO
const produtos = {
"7908371602560": {codigo:"1743",descricao:"ANTARCTICA 1L"},
"38992": {codigo:"9068",descricao:"SKOL LATA"}
};

// CAMERA
function iniciarCamera(){
if(cameraAtiva) return;
cameraAtiva = true;

Quagga.init({
inputStream:{type:"LiveStream",target:document.getElementById('camera'),constraints:{facingMode:"environment"}},
decoder:{readers:["ean_reader","code_128_reader"]}
},
err=>{
if(err){alert("Erro camera");return;}
Quagga.start();
});

Quagga.onDetected(res=>{
if(lendo) return;
lendo = true;

let code = res.codeResult.code;
if(code.length < 5) return;

beep();
add(code);

setTimeout(()=>lendo=false,2000);
});
}

// SOM
function beep(){
new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3").play();
}

// ADD ITEM
function add(ean){

let tabela = document.getElementById("lista");
let rows = tabela.querySelectorAll("tr");

for(let r of rows){
if(r.cells[0].innerText==ean){
r.cells[3].innerText = parseInt(r.cells[3].innerText)+1;
return;
}
}

let p = produtos[ean] || {codigo:"N/A",descricao:"NÃO CADASTRADO"};

let tr = document.createElement("tr");

if(p.codigo=="N/A") tr.style.background="#fff3cd";

tr.innerHTML = `
<td>${ean}</td>
<td>${p.codigo}</td>
<td>${p.descricao}</td>
<td>1</td>
`;

tabela.appendChild(tr);
}

// LIMPAR
function limpar(){
document.getElementById("lista").innerHTML="";
}

// ENVIAR
async function enviar(){

let rows = document.querySelectorAll("#lista tr");
if(rows.length==0){alert("Sem dados");return;}

let digest;

try{
let r = await fetch(SITE+"/_api/contextinfo",{method:"POST"});
let d = await r.json();
digest = d.d.GetContextWebInformation.FormDigestValue;
}catch(e){
alert("ERRO LOGIN SHAREPOINT");
return;
}

for(let row of rows){

let ean = row.cells[0].innerText;
let codigo = row.cells[1].innerText;
let desc = row.cells[2].innerText;
let qtd = parseInt(row.cells[3].innerText);

let data = {
"__metadata": {"type": TYPE},
"Title": ean,
"EAN": ean,
"codigo": codigo,
"descricao": desc,
"und": qtd
};

try{
let res = await fetch(SITE+`/_api/web/lists/getbytitle('${LIST}')/items`,{
method:"POST",
headers:{
"Accept":"application/json;odata=verbose",
"Content-Type":"application/json;odata=verbose",
"X-RequestDigest":digest
},
body:JSON.stringify(data)
});

row.style.background = res.ok ? "#d4edda" : "#f8d7da";

}catch(e){
row.style.background="#f8d7da";
}

}

alert("Finalizado");

}

</script>

</body>
</html>
``

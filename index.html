<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Estoque</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0078d4; /* Cor padrão SharePoint */
        }

        /* Estilização da Janela da Câmera */
        #reader {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            background-color: #f9f9f9;
        }

        input:readonly {
            background-color: #e9ecef;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #107c41; /* Verde Excel/SharePoint */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0b5930;
        }

        /* Tabela de Conferência */
        .table-container {
            margin-top: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f2f2f2;
            color: #333;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Leitor & Conferência</h2>

    <div id="reader"></div>

    <div class="form-group">
        <label for="ean">Código EAN (Lido):</label>
        <input type="text" id="ean" placeholder="Aguardando leitura..." readonly>
    </div>

    <div class="form-group">
        <label for="codigo">Código Interno:</label>
        <input type="text" id="codigo" placeholder="Buscando no sistema..." readonly>
    </div>

    <div class="form-group">
        <label for="descricao">Descrição do Produto:</label>
        <input type="text" id="descricao" placeholder="Buscando no sistema..." readonly>
    </div>

    <div class="form-group">
        <label for="qtd">Quantidade:</label>
        <input type="number" id="qtd" value="1" min="1">
    </div>

    <button id="btnInserir">Inserir na Conferência</button>

    <div class="table-container">
        <h3>Produtos Conferidos</h3>
        <table id="tabelaConferidos">
            <thead>
                <tr>
                    <th>EAN</th>
                    <th>Código</th>
                    <th>Descrição</th>
                    <th>Qtd</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Inicializa o leitor de código de barras
    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 10, 
            qrbox: { width: 250, height: 150 }, // Formato retangular ideal para código de barras
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        }
    );

    // Função que roda quando um código é lido com sucesso
    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('ean').value = decodedText;
        
        // Simulação de busca (Estático por enquanto, até linkarmos o SharePoint)
        document.getElementById('codigo').value = "PROD-" + decodedText.substring(0, 4);
        document.getElementById('descricao').value = "Produto Simulado " + decodedText;
        
        // Emite um bipe sonoro leve para o usuário saber que leu (opcional)
        if (window.navigator.vibrate) window.navigator.vibrate(100);
    }

    html5QrcodeScanner.render(onScanSuccess);

    // 2. Lógica para inserir os dados lidos na tabela temporária de conferência
    document.getElementById('btnInserir').addEventListener('click', function() {
        const ean = document.getElementById('ean').value;
        const codigo = document.getElementById('codigo').value;
        const descricao = document.getElementById('descricao').value;
        const qtd = document.getElementById('qtd').value;

        if (!ean) {
            alert("Por favor, faça a leitura de um código de barras primeiro!");
            return;
        }

        // Cria a nova linha na tabela visual
        const tbody = document.querySelector('#tabelaConferidos tbody');
        const novaLinha = document.createElement('tr');

        novaLinha.innerHTML = `
            <td>${ean}</td>
            <td>${codigo}</td>
            <td>${descricao}</td>
            <td>${qtd}</td>
        `;

        tbody.appendChild(novaLinha);

        // Limpa os campos para a próxima leitura
        document.getElementById('ean').value = "";
        document.getElementById('codigo').value = "";
        document.getElementById('descricao').value = "";
        document.getElementById('qtd').value = "1";
    });
</script>

</body>
</html>
